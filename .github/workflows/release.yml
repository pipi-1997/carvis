name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install --global npm@11.11.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Detect eligible changeset gate
        id: eligible
        shell: bash
        run: |
          echo "Checking eligible changeset gate"
          echo "eligible=$(node ./scripts/release/check-eligible-changesets.mjs)" >> "$GITHUB_OUTPUT"

      - name: Create or update release PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run release:version
          publish: bun run release:publish
          createGithubReleases: false
        env:
          CARVIS_RELEASE_SUMMARY_FILE: ./.carvis-release-summary.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive carvis release state
        id: carvis_release
        if: always()
        env:
          CARVIS_RELEASE_SUMMARY_FILE: ./.carvis-release-summary.json
        shell: bash
        run: |
          summary_file="${CARVIS_RELEASE_SUMMARY_FILE}"

          summary_present="false"
          tag_name=""
          version=""
          did_fail="false"
          did_publish_any="false"

          if [ -f "$summary_file" ]; then
            summary_present="true"
            tag_name="$(node -e 'const fs=require("node:fs"); const s=JSON.parse(fs.readFileSync(process.env.CARVIS_RELEASE_SUMMARY_FILE,"utf8")); process.stdout.write(String(s.tagName ?? ""))')"
            version="$(node -e 'const fs=require("node:fs"); const s=JSON.parse(fs.readFileSync(process.env.CARVIS_RELEASE_SUMMARY_FILE,"utf8")); process.stdout.write(String(s.version ?? ""))')"
            did_fail="$(node -e 'const fs=require("node:fs"); const s=JSON.parse(fs.readFileSync(process.env.CARVIS_RELEASE_SUMMARY_FILE,"utf8")); const failed = s.status==="failed" || (Array.isArray(s.results) && s.results.some(r => r.status==="failed")); process.stdout.write(failed ? "true" : "false")')"
            did_publish_any="$(node -e 'const fs=require("node:fs"); const s=JSON.parse(fs.readFileSync(process.env.CARVIS_RELEASE_SUMMARY_FILE,"utf8")); const any = Array.isArray(s.results) && s.results.some(r => r.status==="published"); process.stdout.write(any ? "true" : "false")')"
          fi

          tag_exists="false"
          if [ -n "$tag_name" ]; then
            if git ls-remote --tags origin "refs/tags/${tag_name}" | grep -q .; then
              tag_exists="true"
            fi
          fi

          # We treat "published" as the happy path, but also support the recovery case:
          # packages already published (skipped_existing_version) yet the git tag/release is missing.
          should_release="false"
          if [ "$did_publish_any" = "true" ]; then
            should_release="true"
          elif [ "$summary_present" = "true" ] && [ "$did_fail" = "false" ] && [ -n "$tag_name" ] && [ "$tag_exists" = "false" ]; then
            should_release="true"
          fi

          echo "summary_present=$summary_present" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "did_fail=$did_fail" >> "$GITHUB_OUTPUT"
          echo "did_publish_any=$did_publish_any" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$tag_exists" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

      - name: Expose hasChangesets state
        if: always()
        run: echo "hasChangesets=${{ steps.changesets.outputs.hasChangesets }}"

      - name: Expose published state
        if: always()
        run: echo "published=${{ steps.changesets.outputs.published }}"

      - name: Skip release workflow when there is no release work
        if: steps.carvis_release.outputs.should_release != 'true' && steps.changesets.outputs.hasChangesets != 'true'
        run: echo "No release PR update or publish work for this push."

      - name: Render release summary
        if: steps.carvis_release.outputs.should_release == 'true'
        env:
          CARVIS_RELEASE_SUMMARY_FILE: ./.carvis-release-summary.json
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const summary = JSON.parse(
            fs.readFileSync(process.env.CARVIS_RELEASE_SUMMARY_FILE, "utf8"),
          );
          const lines = [
            `# Release ${summary.tagName}`,
            "",
            `- Unified version: \`${summary.version}\``,
            `- Status: \`${summary.status}\``,
            "",
            "| Package | Version | Status | Summary |",
            "|---------|---------|--------|---------|",
            ...summary.results.map((entry) =>
              `| ${entry.name} | ${entry.version} | ${entry.status} | ${entry.summary} |`
            ),
            "",
            "## Retry Guidance",
            "",
            "- Preferred: rerun this workflow",
            "- Fallback: use the documented manual publish path",
          ];
          const markdown = `${lines.join("\n")}\n`;
          fs.writeFileSync("release-summary.md", markdown);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, markdown);
          NODE

      - name: Upload release summary artifact
        if: steps.carvis_release.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-summary
          path: |
            ./.carvis-release-summary.json
            ./release-summary.md

      - name: Create git tag
        if: steps.carvis_release.outputs.should_release == 'true'
        env:
          CARVIS_RELEASE_SUMMARY_FILE: ./.carvis-release-summary.json
        run: |
          tag_name="$(node -e 'const fs=require("node:fs"); const summary=JSON.parse(fs.readFileSync(process.env.CARVIS_RELEASE_SUMMARY_FILE,"utf8")); process.stdout.write(summary.tagName ?? "")')"
          if [ -z "$tag_name" ]; then
            echo "No tag name found in release summary"
            exit 1
          fi

          if git rev-parse "$tag_name" >/dev/null 2>&1 || git ls-remote --tags origin "refs/tags/${tag_name}" | grep -q .; then
            echo "Tag ${tag_name} already exists, skipping tag creation."
            exit 0
          fi

          git tag "$tag_name"
          git push origin "$tag_name"

      - name: Sync GitHub release
        if: steps.carvis_release.outputs.should_release == 'true'
        uses: actions/github-script@v7
        env:
          CARVIS_RELEASE_SUMMARY_FILE: ./.carvis-release-summary.json
        with:
          script: |
            const fs = require("node:fs");
            const summary = JSON.parse(fs.readFileSync(process.env.CARVIS_RELEASE_SUMMARY_FILE, "utf8"));
            const body = fs.readFileSync("release-summary.md", "utf8");
            const tag = summary.tagName;

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                body,
                name: tag,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body,
              });
            }
